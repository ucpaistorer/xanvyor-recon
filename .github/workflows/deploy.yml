name: Deploy to VPS

on:
  workflow_dispatch:
  repository_dispatch:
    types: [deploy]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 76.13.198.125
          username: root
          password: 753951Ucup##
          script: |
            echo "Starting deployment..."
            cd /root/xanvyor-recon 2>/dev/null || {
              echo "Cloning repository..."
              rm -rf /root/xanvyor-recon
              git clone https://github.com/ucpaistorer/xanvyor-recon.git /root/xanvyor-recon
