name: Deploy to VPS

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 76.13.198.125
          username: root
          password: ${{ secrets.VPS_PASSWORD }}
          script_stop: true
          command_timeout: 30m
          script: |
            set -e

            APP_DIR="/opt/xanvyor-recon"

            echo "========================================"
            echo "  XANVYOR RECON - Auto Deploy Start"
            echo "========================================"

            # 1. Install Node.js 20
            echo "[1/8] Installing Node.js 20..."
            if ! command -v node &> /dev/null; then
              curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
              apt-get install -y nodejs
            fi
            node -v
            echo "OK Node.js"

            # 2. Install build tools
            echo "[2/8] Installing build tools..."
            apt-get update -y
            apt-get install -y build-essential python3 curl git

            # 3. Install Nginx & Certbot
            echo "[3/8] Installing Nginx & Certbot..."
            apt-get install -y nginx certbot python3-certbot-nginx
            systemctl enable nginx
            systemctl start nginx || true
            echo "OK Nginx"

            # 4. Clone or update project
            echo "[4/8] Getting project code..."
            if [ -d "$APP_DIR" ]; then
              cd $APP_DIR
              git pull origin main || true
            else
              git clone https://github.com/ucpaistorer/xanvyor-recon.git $APP_DIR
              cd $APP_DIR
            fi

            # 5. Install deps
            echo "[5/8] Installing dependencies..."
            cd $APP_DIR
            npm install --legacy-peer-deps
            npx prisma generate

            # Create .env
            echo "DATABASE_URL=file:$APP_DIR/db/xanvyor.db" > $APP_DIR/.env
            mkdir -p $APP_DIR/db

            # Push DB schema
            npx prisma db push

            # Seed database
            node -e "
            const { PrismaClient } = require('@prisma/client');
            const prisma = new PrismaClient();
            async function main() {
              const admin = await prisma.user.upsert({
                where: { id: 'admin-001' },
                update: {},
                create: { id: 'admin-001', name: 'Admin', phone: '6287892614294' }
              });
              await prisma.apiKey.upsert({
                where: { key: 'recon-admin-8vv2EzXBG7xG8qt0trde4hnQefDvoTNXomjVgB32b4d76b0a' },
                update: { isActive: true, plan: 'lifetime', label: 'Admin Master Key' },
                create: { key: 'recon-admin-8vv2EzXBG7xG8qt0trde4hnQefDvoTNXomjVgB32b4d76b0a', userId: admin.id, plan: 'lifetime', label: 'Admin Master Key', isActive: true }
              });
              await prisma.apiKey.upsert({
                where: { key: '8vv2EzXBG7xG8qt0trde4hnQefDvoTNXomjVgB32b4d76b0a' },
                update: { isActive: true, plan: 'lifetime', label: 'Admin Key' },
                create: { key: '8vv2EzXBG7xG8qt0trde4hnQefDvoTNXomjVgB32b4d76b0a', userId: admin.id, plan: 'lifetime', label: 'Admin Key', isActive: true }
              });
              console.log('OK Database seeded');
            }
            main().catch(e => { console.error(e); process.exit(1); }).finally(() => prisma.\$disconnect());
            "

            # 6. Build
            echo "[6/8] Building project..."
            npm run build
            echo "OK Build complete"

            # 7. Configure Nginx
            echo "[7/8] Configuring Nginx..."
            cat > /etc/nginx/sites-available/xanvyorrecon.id << 'NGINXEOF'
            server {
                listen 80;
                listen [::]:80;
                server_name xanvyorrecon.id www.xanvyorrecon.id;

                location / {
                    proxy_pass http://127.0.0.1:3000;
                    proxy_http_version 1.1;
                    proxy_set_header Upgrade $http_upgrade;
                    proxy_set_header Connection 'upgrade';
                    proxy_set_header Host $host;
                    proxy_set_header X-Real-IP $remote_addr;
                    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                    proxy_set_header X-Forwarded-Proto $scheme;
                    proxy_cache_bypass $http_upgrade;
                    proxy_read_timeout 300s;
                    proxy_send_timeout 300s;
                }
                client_max_body_size 50M;
            }
            NGINXEOF

            ln -sf /etc/nginx/sites-available/xanvyorrecon.id /etc/nginx/sites-enabled/
            rm -f /etc/nginx/sites-enabled/default
            nginx -t && systemctl reload nginx
            echo "OK Nginx configured"

            # 8. Systemd service
            echo "[8/8] Setting up systemd service..."
            NODE_PATH=$(which node)
            cat > /etc/systemd/system/xanvyor-recon.service << SVCEOF
            [Unit]
            Description=XANVYOR RECON OSINT Platform
            After=network.target

            [Service]
            Type=simple
            User=root
            WorkingDirectory=$APP_DIR
            Environment=NODE_ENV=production
            Environment=DATABASE_URL=file:$APP_DIR/db/xanvyor.db
            ExecStart=$NODE_PATH $APP_DIR/.next/standalone/server.js
            Restart=always
            RestartSec=10

            [Install]
            WantedBy=multi-user.target
            SVCEOF

            systemctl daemon-reload
            systemctl enable xanvyor-recon
            systemctl restart xanvyor-recon
            echo "OK Service started"

            # Wait for app to start
            sleep 5

            # Check if app is running
            if systemctl is-active --quiet xanvyor-recon; then
              echo "========================================"
              echo "  DEPLOYMENT SUCCESSFUL!"
              echo "========================================"
              echo "App running on port 3000"
              echo "Nginx proxy configured"
              systemctl status xanvyor-recon --no-pager || true
            else
              echo "ERROR: Service failed to start"
              journalctl -u xanvyor-recon --no-pager -n 50 || true
              exit 1
            fi

            # Try SSL (will only work after DNS is pointed)
            echo "Attempting SSL certificate..."
            certbot --nginx -d xanvyorrecon.id -d www.xanvyorrecon.id \
              --non-interactive --agree-tos --email admin@xanvyorrecon.id --redirect 2>/dev/null || \
              echo "SSL skipped - DNS may not be ready yet. Run manually after DNS update."
